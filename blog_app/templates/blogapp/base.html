<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Auth Blog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fdf6f0; /* A very light, neutral background */
            color: #333;
            font-family: sans-serif;
        }
        .navbar {
            background-color: #A7D2E8; /* Sky Blue */
        }
        .btn-primary {
            background-color: #DCAE96; /* Dusty Rose */
            border-color: #DCAE96;
        }
        .btn-primary:hover {
            background-color: #c7b8e2; /* Lavender */
            border-color: #c7b8e2;
        }
        .btn-secondary {
            background-color: #A8D8B9; /* Mint */
            border-color: #A8D8B9;
        }
         .btn-secondary:hover {
            background-color: #c7b8e2; /* Lavender */
            border-color: #c7b8e2;
        }
        .card {
            background-color: #fff;
            border: 1px solid #eee;
        }
        .container {
            max-width: 960px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Auth Blog</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><span class="nav-link">Welcome, {{ user.username }}</span></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'create_post' %}">Create Post</a></li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-link nav-link">Logout</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'signup' %}">Signup</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

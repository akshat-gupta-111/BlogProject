{% extends 'blogapp/base.html' %}

{% block title %}Create Post{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h1 class="card-title text-center">New Post</h1>
                <p class="card-text text-center">Create a new post to share with everyone.</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">Title</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label for="id_content" class="form-label">Content</label>
                        {{ form.content }}
                    </div>
                    <div class="mb-3">
                        <label for="id_image" class="form-label">Image</label>
                        {{ form.image }}
                    </div>
                    <div class="text-center">
                        <button type="submit" name="action" value="publish" class="btn btn-primary">Publish</button>
                        <button type="submit" name="action" value="draft" class="btn btn-secondary">Save Draft</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

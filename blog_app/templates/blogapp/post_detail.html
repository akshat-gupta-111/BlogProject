{% extends 'blogapp/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-body">
                <h1 class="card-title text-center">{{ post.title }}</h1>
                <p class="card-text text-center text-muted">By {{ post.author.username }} on {{ post.created_at|date:"F d, Y" }}</p>
                {% if post.image %}
                    <img src="{{ post.image.url }}" class="img-fluid rounded mx-auto d-block my-4" alt="Post Image">
                {% endif %}
                <div class="card-text">
                    {{ post.content|linebreaks }}
                </div>
                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="btn btn-secondary">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
